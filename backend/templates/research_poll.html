{% extends "base.html" %}
{% block title %}研究中 — {{ query }}{% endblock %}

{% block content %}
<div class="max-w-xl mx-auto text-center" x-data="researchPoller()">
  <div class="mb-8">
    <div class="inline-flex items-center gap-2 px-4 py-1.5 bg-primary-50 text-primary text-sm rounded-full mb-4">
      <span class="w-2 h-2 bg-primary rounded-full" :class="isRunning ? 'animate-pulse' : ''"></span>
      <span x-text="isRunning ? '研究中...' : '已完成'"></span>
    </div>
    <h1 class="text-2xl font-bold text-gray-900" x-text="query"></h1>
    <p class="text-gray-500 text-sm mt-2">正在收集和分析公开数据，请稍候...</p>
  </div>

  <!-- Progress -->
  <div class="glass-card rounded-2xl p-8">
    <div class="w-full bg-gray-100 rounded-full h-2.5 mb-6 overflow-hidden">
      <div class="progress-bar h-2.5 rounded-full transition-all duration-700 ease-out" :style="'width: ' + percent + '%'"></div>
    </div>

    <p class="text-gray-800 font-medium text-sm" x-text="statusMessage"></p>
    <p class="text-gray-400 text-xs mt-1" x-text="statusDetail"></p>

    <!-- Step indicators -->
    <div class="flex items-center mt-8">
      <template x-for="(s, i) in steps" :key="i">
        <div class="flex items-center flex-1 last:flex-none">
          <div class="flex flex-col items-center">
            <div :class="'w-8 h-8 rounded-full flex items-center justify-center text-xs font-bold transition-all duration-300 ' + (
              currentStep > i ? 'bg-primary text-white' :
              currentStep === i ? 'bg-primary text-white ring-4 ring-primary/20' :
              currentStep < i && failed ? 'bg-red-100 text-red-500' :
              'bg-gray-100 text-gray-400'
            )">
              <template x-if="currentStep > i">✓</template>
              <template x-if="currentStep === i">
                <svg class="animate-spin h-4 w-4" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg>
              </template>
              <template x-if="currentStep < i && !failed" x-text="i + 1"></template>
              <template x-if="currentStep < i && failed">!</template>
            </div>
            <span :class="'text-[10px] mt-1.5 ' + (currentStep >= i ? 'text-primary font-semibold' : 'text-gray-400')" x-text="s"></span>
          </div>
          <div :class="'flex-1 h-0.5 mx-1 ' + (currentStep > i ? 'bg-primary' : 'bg-gray-100')" x-show="i < steps.length - 1"></div>
        </div>
      </template>
    </div>
  </div>

  <!-- Error -->
  <div x-show="errorMessage" class="mt-6">
    <div class="bg-red-50 border border-red-200 rounded-2xl p-5">
      <p class="font-semibold text-red-800 text-sm">出错了</p>
      <p class="text-red-600 text-xs mt-1" x-text="errorMessage"></p>
      <button @click="window.location.href='/'" class="mt-3 px-4 py-2 bg-red-100 text-red-700 text-sm rounded-xl hover:bg-red-200 transition">返回首页</button>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
function researchPoller() {
  return {
    query: '{{ query }}',
    taskId: '{{ task_id }}',
    isRunning: true,
    failed: false,
    currentStep: 0,
    percent: 0,
    statusMessage: '正在启动...',
    statusDetail: '',
    errorMessage: '',
    steps: ['分类', '搜索', '抓取', '提取', '生成'],
    STATUS_KEY: { pending: 0, classified: 1, searched: 2, fetched: 3, extracted: 4, complete: 5, error: -1 },
    async init() {
      const steps = [
        { name: 'classify', endpoint: `/api/research/${this.taskId}/step-classify`, label: '正在分析查询类型...', pct: 15 },
        { name: 'search', endpoint: `/api/research/${this.taskId}/step-search`, label: '正在搜索相关信息...', pct: 30 },
        { name: 'fetch', endpoint: `/api/research/${this.taskId}/step-fetch`, label: '正在获取网页内容...', pct: 50 },
        { name: 'extract', endpoint: `/api/research/${this.taskId}/step-extract`, label: '正在提取关键数据...', pct: 70 },
        { name: 'generate', endpoint: `/api/research/${this.taskId}/step-generate`, label: '正在生成研究报告...', pct: 90 },
      ];
      for (let i = 0; i < steps.length; i++) {
        this.currentStep = i;
        this.statusMessage = steps[i].label;
        this.percent = steps[i].pct;
        try {
          const resp = await fetch(steps[i].endpoint, { method: 'POST' });
          const data = await resp.json();
          if (data.status === 'complete') {
            this.currentStep = 5;
            this.percent = 100;
            this.statusMessage = '报告生成完成！';
            this.isRunning = false;
            setTimeout(() => window.location.href = data.url || `/report/${this.taskId}`, 800);
            return;
          }
          if (data.status === 'error') {
            throw new Error(data.error_message || '步骤失败');
          }
        } catch (e) {
          this.errorMessage = e.message.includes('Failed to fetch') ? '网络请求失败，请检查网络' : (e.message || '处理出错');
          this.failed = true;
          this.isRunning = false;
          return;
        }
      }
      // Final check
      try {
        const resp = await fetch(`/api/research/${this.taskId}/status`);
        const data = await resp.json();
        if (data.status === 'complete') {
          window.location.href = `/report/${this.taskId}`;
        } else {
          this.errorMessage = '报告生成未完成，请稍后重试';
          this.isRunning = false;
        }
      } catch (e) {
        this.errorMessage = '获取结果失败';
        this.isRunning = false;
      }
    },
  };
}
</script>
{% endblock %}
